<style>
        body {

<body class="min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container font-body">
<!-- Content Canvas (Navigation Shell Suppressed due to Transactional Intent) -->
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<!-- Ambient Stage Lighting Effect -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[80vw] h-[512px] bg-primary-container opacity-[0.03] blur-[120px] pointer-events-none rounded-full"></div>
<div class="absolute bottom-0 right-0 w-[40vw] h-[409px] bg-secondary opacity-[0.02] blur-[100px] pointer-events-none rounded-full"></div>
<div class="w-full max-w-5xl flex flex-col md:flex-row items-center gap-12 lg:gap-24 z-10 relative">
<!-- Dramatic Intro Section -->
<div class="hidden md:flex flex-col justify-center flex-1 max-w-lg space-y-6">
<div class="space-y-2">
<span class="font-mono text-xs text-on-surface-variant uppercase tracking-[0.2em]">Terminal Initialized</span>
<h1 class="font-headline text-5xl lg:text-7xl italic text-on-surface leading-tight tracking-tight">
                        The stage is set. <br/>
<span class="text-on-surface-variant">Your presence is</span> <span class="text-primary-container">required.</span>
</h1>
</div>
<div class="h-[2px] w-12 bg-primary-container"></div>
<p class="font-mono text-sm text-on-surface-variant leading-relaxed opacity-80">
                    &gt; ENCRYPTED HANDSHAKE... OK<br/>
                    &gt; VERIFYING CREDENTIALS... PENDING<br/>
                    &gt; AWAITING OPERATOR INPUT...
                </p>
</div>
<!-- Auth Panel -->
<div class="w-full max-w-md glass-panel ghost-border rounded-DEFAULT crimson-glow p-8 md:p-10 relative">
<!-- Internal Lighting Accent -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container opacity-[0.05] blur-[40px] pointer-events-none rounded-full"></div>
<!-- Toggle / Headers -->
<div class="mb-8 flex flex-col space-y-6">
<div class="flex bg-surface-container-low rounded-DEFAULT p-1 w-full max-w-[240px] mx-auto ghost-border">
<button class="flex-1 py-2 text-center text-sm font-mono tracking-wider text-surface-dim bg-primary-container rounded-DEFAULT shadow-sm transition-all">SIGN IN</button>
<button class="flex-1 py-2 text-center text-sm font-mono tracking-wider text-on-surface-variant hover:text-on-surface transition-all">SIGN UP</button>
</div>
</div>
<!-- Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-4">
<div class="space-y-1">
<label class="block font-mono text-xs tracking-widest text-on-surface-variant uppercase">Operator Identifier</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface font-body rounded-DEFAULT px-4 py-3 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container/50 transition-colors" placeholder="email@terminal.sys" type="email"/>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="block font-mono text-xs tracking-widest text-on-surface-variant uppercase">Passcode</label>
<a class="font-mono text-[10px] text-primary-container hover:text-primary transition-colors uppercase tracking-wider" href="#">Override?</a>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface font-body rounded-DEFAULT px-4 py-3 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container/50 transition-colors" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full gradient-btn font-label text-sm uppercase tracking-widest py-4 rounded-DEFAULT hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Initialize Protocol</span>
<span class="material-symbols-outlined text-sm" data-icon="login" data-weight="fill" style="font-variation-settings: 'FILL' 1;">login</span>
</button>
</form>
<!-- Divider -->
<div class="my-8 flex items-center gap-4">
<div class="h-px bg-outline-variant/20 flex-1"></div>
<span class="font-mono text-[10px] text-on-surface-variant tracking-widest uppercase">Or Proxy Via</span>
<div class="h-px bg-outline-variant/20 flex-1"></div>
</div>
<!-- Social Logins -->
<div class="space-y-3">
<button class="w-full bg-surface-container-low hover:bg-surface-container border border-outline-variant/20 py-3 rounded-DEFAULT font-mono text-xs tracking-widest text-on-surface transition-colors flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
                        GITHUB PROTOCOL
                    </button>
<button class="w-full bg-surface-container-low hover:bg-surface-container border border-outline-variant/20 py-3 rounded-DEFAULT font-mono text-xs tracking-widest text-on-surface transition-colors flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="public">public</span>

            © 2024 THE GRAND STAGE TERMINAL. ALL PERFORMANCE LOGS ENCRYPTED.
        </div>
<div class="flex gap-6 font-['JetBrains_Mono'] text-[10px] tracking-tighter uppercase">
<a class="text-[#888880] hover:text-[#C41E3A] transition-colors" href="#">Protocol</a>
<a class="text-[#888880] hover:text-[#C41E3A] transition-colors" href="#">Privacy</a>
<a class="text-[#888880] hover:text-[#C41E3A] transition-colors" href="#">Manifesto</a>
</div>
</footer>
